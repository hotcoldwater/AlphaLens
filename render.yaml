services:
  - type: web
    name: alphalens-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ALPHALENS_ALLOWED_ORIGINS
        value: https://alphalens-cds.pages.dev
      - key: OPENAI_MODEL
        value: gpt-5.6
      - key: OPENAI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: KRX_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
